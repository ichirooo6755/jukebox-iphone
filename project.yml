name: JukeboxHost
options:
  bundleIdPrefix: com.jukebox
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
packages:
  JukeboxCore:
    path: Packages/JukeboxCore
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
targets:
  JukeboxHost:
    type: application
    platform: iOS
    sources:
      - JukeboxHost
    resources:
      - JukeboxHost/Resources
      - path: web
    dependencies:
      - package: JukeboxCore
        product: JukeboxCore
    settings:
      base:
        INFOPLIST_FILE: JukeboxHost/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jukebox.host
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: JukeboxHost/JukeboxHost.entitlements
