name: JukeboxHost
options:
  bundleIdPrefix: com.ichirooo6755.jukebox
  deploymentTarget:
    iOS: "16.2"
    macOS: "14.0"
  xcodeVersion: "16.0"
packages:
  JukeboxCore:
    path: Packages/JukeboxCore
settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: K5D7GVJFG7
targets:
  JukeboxHost:
    type: application
    platform: iOS
    sources:
      - JukeboxHost
    resources:
      - JukeboxHost/Resources
      - path: JukeboxHost/Resources/Secrets.plist
        optional: true
      - path: web
        type: folder
    dependencies:
      - package: JukeboxCore
        product: JukeboxCore
    settings:
      base:
        INFOPLIST_FILE: JukeboxHost/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ichirooo6755.jukebox.host
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: JukeboxHost/JukeboxHost.entitlements
    postBuildScripts:
      - name: Copy Web PWA
        script: |
          set -e
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/web"
          rm -rf "$DEST"
          ditto "${SRCROOT}/web" "$DEST"
          rm -rf "$DEST/landing/.netlify"
  JukeboxHostMac:
    type: application
    platform: macOS
    sources:
      - JukeboxHost
    resources:
      - JukeboxHost/Resources
      - path: JukeboxHost/Resources/Secrets.plist
        optional: true
      - path: web
        type: folder
    dependencies:
      - package: JukeboxCore
        product: JukeboxCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ichirooo6755.jukebox.host.mac
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Jukebox
        INFOPLIST_KEY_LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        INFOPLIST_KEY_NSAppleMusicUsageDescription: Apple Musicの楽曲検索と再生に使用します
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: 同一Wi-Fi上の参加者とキューを同期するためにローカルネットワークを使用します
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    entitlements:
      path: JukeboxHost/JukeboxHostMac.entitlements
    postBuildScripts:
      - name: Copy Web PWA
        script: |
          set -e
          DEST="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/web"
          rm -rf "$DEST"
          ditto "${SRCROOT}/web" "$DEST"
          rm -rf "$DEST/landing/.netlify"
  JukeboxGuest:
    type: application
    platform: iOS
    sources:
      - JukeboxGuest
    dependencies:
      - package: JukeboxCore
        product: JukeboxCore
      - target: JukeboxGuestWidget
        embed: true
    settings:
      base:
        INFOPLIST_FILE: JukeboxGuest/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ichirooo6755.jukebox.guest
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
  JukeboxGuestWidget:
    type: app-extension
    platform: iOS
    sources:
      - JukeboxGuestWidget
      - path: JukeboxGuest/Shared
    settings:
      base:
        INFOPLIST_FILE: JukeboxGuestWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ichirooo6755.jukebox.guest.widget
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
schemes:
  JukeboxHost:
    build:
      targets:
        JukeboxHost: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JukeboxHostMac:
    build:
      targets:
        JukeboxHostMac: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  JukeboxGuest:
    build:
      targets:
        JukeboxGuest: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
