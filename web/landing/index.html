<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="Jukebox 参加者用ランディングページ">
  <title>Jukebox 参加</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0a0a;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #f5f5f5;
      --muted: #9a9a9a;
      --accent: #ff4f8b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, #1a1014 0%, var(--bg) 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    .card {
      width: min(100%, 420px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
    }
    .logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 12px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255, 79, 139, 0.15);
      color: var(--accent);
      font-size: 1.6rem;
    }
    h1 { margin: 0 0 8px; font-size: 1.5rem; }
    p { color: var(--muted); line-height: 1.5; margin: 0; }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    code {
      display: block;
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      background: #111;
      word-break: break-all;
      font-size: 0.85rem;
      text-align: left;
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 16px auto 0;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">♪</div>
    <h1>Jukebox</h1>
    <p id="message">ホストへ接続しています...</p>
    <div id="spinner" class="spinner" hidden></div>
    <code id="host-display"></code>
    <a id="manual-link" class="btn" hidden>手動で開く</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const host = params.get('host');

    const message = document.getElementById('message');
    const hostDisplay = document.getElementById('host-display');
    const manualLink = document.getElementById('manual-link');
    const spinner = document.getElementById('spinner');

    function isPrivateHost(url) {
      try {
        const parsed = new URL(url);
        const hostname = parsed.hostname;
        if (hostname === 'localhost' || hostname === '127.0.0.1') return true;
        if (/^192\.168\./.test(hostname)) return true;
        if (/^10\./.test(hostname)) return true;
        if (/^172\.(1[6-9]|2\d|3[0-1])\./.test(hostname)) return true;
        return false;
      } catch {
        return false;
      }
    }

    if (!host) {
      message.textContent = 'QRコードに host パラメータが必要です。';
      hostDisplay.textContent = '例: ?host=http://192.168.1.10:8765';
      spinner.hidden = true;
    } else if (!isPrivateHost(host)) {
      message.textContent = 'host は LAN 内のホスト URL を指定してください。';
      hostDisplay.textContent = host;
      spinner.hidden = true;
    } else {
      const target = host.replace(/\/$/, '');
      hostDisplay.textContent = target;
      manualLink.href = `${target}/?join=1`;
      manualLink.hidden = false;
      spinner.hidden = false;
      message.textContent = '同じ Wi-Fi に接続したうえで、ホストへ移動します。';
      setTimeout(() => {
        window.location.href = `${target}/?join=1`;
      }, 900);
    }
  </script>
</body>
</html>
